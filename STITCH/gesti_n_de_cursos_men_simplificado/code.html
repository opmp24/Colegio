<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                    },
                    fontFamily: {
                        "display": ["Public Sans"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<title>Ajustes de Agenda Escolar</title>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
<!-- Main Container -->
<div class="max-w-md mx-auto min-h-screen flex flex-col shadow-xl bg-background-light dark:bg-background-dark">
<!-- Header -->
<header class="flex items-center p-4 border-b border-slate-200 dark:border-slate-800 sticky top-0 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md z-10">
<button class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined block text-slate-600 dark:text-slate-400">arrow_back</span>
</button>
<h1 class="flex-1 text-center text-lg font-bold">Ajustes de Agenda</h1>
<button class="p-2 text-primary hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined block">check</span>
</button>
</header>
<!-- Content -->
<main class="flex-1 p-4 space-y-8 overflow-y-auto pb-24">
<!-- Section: Add New Course -->
<section class="space-y-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary">add_circle</span>
<h2 class="text-xl font-bold tracking-tight">Nuevo Curso</h2>
</div>
<div class="bg-white dark:bg-slate-900 p-5 rounded-xl border border-slate-200 dark:border-slate-800 space-y-4 shadow-sm">
<label class="block">
<span class="text-sm font-semibold text-slate-600 dark:text-slate-400 mb-2 block">Nombre del Curso</span>
<input class="w-full rounded-lg border-slate-300 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 focus:ring-primary focus:border-primary text-base placeholder:text-slate-400" placeholder="Ej: 1º Bachillerato A" type="text"/>
</label>
<div>
<span class="text-sm font-semibold text-slate-600 dark:text-slate-400 mb-3 block">Color del Curso</span>
<div class="flex flex-wrap gap-3">
<button class="w-8 h-8 rounded-full bg-blue-500 ring-2 ring-offset-2 ring-primary"></button>
<button class="w-8 h-8 rounded-full bg-emerald-500 hover:ring-2 hover:ring-offset-2 hover:ring-primary transition-all"></button>
<button class="w-8 h-8 rounded-full bg-amber-500 hover:ring-2 hover:ring-offset-2 hover:ring-primary transition-all"></button>
<button class="w-8 h-8 rounded-full bg-rose-500 hover:ring-2 hover:ring-offset-2 hover:ring-primary transition-all"></button>
<button class="w-8 h-8 rounded-full bg-purple-500 hover:ring-2 hover:ring-offset-2 hover:ring-primary transition-all"></button>
<button class="w-8 h-8 rounded-full bg-slate-500 hover:ring-2 hover:ring-offset-2 hover:ring-primary transition-all"></button>
<button class="w-8 h-8 rounded-full border-2 border-dashed border-slate-300 dark:border-slate-700 flex items-center justify-center">
<span class="material-symbols-outlined text-sm">palette</span>
</button>
</div>
</div>
<button class="w-full bg-primary text-white font-bold py-3 rounded-xl hover:opacity-90 transition-opacity flex items-center justify-center gap-2 mt-2">
<span class="material-symbols-outlined">add</span>
                    Crear Curso
                </button>
</div>
</section>
<!-- Section: Existing Courses -->
<section class="space-y-4">
<div class="flex items-center justify-between">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary">school</span>
<h2 class="text-xl font-bold tracking-tight">Cursos Existentes</h2>
</div>
</div>
<!-- Search Input -->
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
<input class="w-full pl-10 pr-4 py-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg text-sm focus:ring-primary focus:border-primary" placeholder="Buscar curso..." type="text"/>
</div>
<div class="space-y-3">
<!-- Course Card 1 -->
<div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 overflow-hidden shadow-sm">
<div class="p-4 flex items-center justify-between border-l-4 border-emerald-500">
<div class="flex items-center gap-3">
<div class="w-3 h-3 rounded-full bg-emerald-500"></div>
<div>
<h3 class="font-bold text-lg leading-none mb-1">2º ESO - Grupo B</h3>
<p class="text-sm text-slate-500">8 Asignaturas vinculadas</p>
</div>
</div>
<div class="flex items-center gap-2">
<button class="p-2 text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined">edit</span>
</button>
<button class="p-2 text-slate-400 hover:text-rose-500 transition-colors">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
</div>
</div>
<!-- Course Card 2 -->
<div class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 overflow-hidden shadow-sm">
<div class="p-4 flex items-center justify-between border-l-4 border-blue-500">
<div class="flex items-center gap-3">
<div class="w-3 h-3 rounded-full bg-blue-500"></div>
<div>
<h3 class="font-bold text-lg leading-none mb-1">Curso de Verano</h3>
<p class="text-sm text-slate-500">2 Asignaturas vinculadas</p>
</div>
</div>
<div class="flex items-center gap-2">
<button class="p-2 text-slate-400 hover:text-primary transition-colors">
<span class="material-symbols-outlined">edit</span>
</button>
<button class="p-2 text-slate-400 hover:text-rose-500 transition-colors">
<span class="material-symbols-outlined text-[20px]">delete</span>
</button>
</div>
</div>
</div>
</div>
</section>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto border-t border-slate-200 dark:border-slate-800 bg-white/95 dark:bg-background-dark/95 backdrop-blur-md flex justify-around items-center px-4 py-2 pb-safe-area">
<a class="flex flex-col items-center gap-1 text-slate-500 dark:text-slate-400 p-2 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Inicio</span>
</a>
<a class="flex flex-col items-center gap-1 text-primary p-2" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">settings</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Ajustes</span>
</a>
</nav>
</div>
</body></html>
