<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Gestión de Usuarios y Roles - Vista Admin</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-fonts">
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      background-color: #F8FAFC;
    }
  </style>
<style data-purpose="layout-styles">
    .main-container {
      max-width: 480px;
      margin: 0 auto;
      background-color: #F8FAFC;
      min-height: 100vh;
      padding-bottom: 80px; /* Space for bottom nav */
    }
    .card-shadow {
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }
    /* Hide scrollbar for color selector */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body>
<div class="main-container relative">
<!-- BEGIN: Header -->
<header class="bg-white border-b border-gray-100 px-4 py-4 flex items-center justify-between sticky top-0 z-10">
<div class="flex items-center gap-3">
<button class="p-1 text-gray-600">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
<h1 class="text-xl font-bold text-gray-800">Gestión de Usuarios</h1>
</div>
<div class="flex items-center">
<span class="bg-blue-50 text-blue-600 text-xs font-bold px-2 py-1 rounded-full border border-blue-100 uppercase">Vista Admin</span>
</div>
</header>
<!-- END: Header -->
<main class="p-4 space-y-6">
<!-- BEGIN: Nuevo Usuario Section -->
<section class="bg-white rounded-2xl p-5 card-shadow border border-gray-50" data-purpose="invite-form">
<div class="flex items-center gap-2 mb-4">
<div class="bg-[#f26522] text-white p-1.5 rounded-lg">
<svg class="h-5 w-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<h2 class="text-lg font-bold text-gray-800">Nuevo Usuario</h2>
</div>
<div class="space-y-4">
<div data-purpose="input-group">
<label class="block text-sm font-medium text-gray-600 mb-1">Nombre o Correo Electrónico</label>
<input class="w-full border-gray-200 rounded-xl focus:ring-blue-500 focus:border-blue-500 bg-slate-50 py-3" placeholder="Ej: Juan Pérez o juan@colegio.com" type="text"/>
</div>
<div class="flex flex-col gap-3">
<label class="block text-sm font-medium text-gray-600">Rol y Color de Identidad</label>
<div class="flex items-center gap-2 overflow-x-auto no-scrollbar py-1">
<button class="flex-shrink-0 w-8 h-8 rounded-full bg-indigo-500 ring-2 ring-offset-2 ring-indigo-500"></button>
<button class="flex-shrink-0 w-8 h-8 rounded-full bg-green-500 hover:ring-2 hover:ring-offset-2 hover:ring-green-500 transition-all"></button>
<button class="flex-shrink-0 w-8 h-8 rounded-full bg-purple-500 hover:ring-2 hover:ring-offset-2 hover:ring-purple-500 transition-all"></button>
<button class="flex-shrink-0 w-8 h-8 rounded-full bg-orange-500 hover:ring-2 hover:ring-offset-2 hover:ring-orange-500 transition-all"></button>
<button class="flex-shrink-0 w-8 h-8 rounded-full bg-red-500 hover:ring-2 hover:ring-offset-2 hover:ring-red-500 transition-all"></button>
<button class="flex-shrink-0 w-8 h-8 rounded-full bg-blue-500 hover:ring-2 hover:ring-offset-2 hover:ring-blue-500 transition-all"></button>
</div>
<select class="w-full border-gray-200 rounded-xl focus:ring-blue-500 focus:border-blue-500 bg-slate-50 py-3 text-sm text-gray-700">
<option value="profesor">Profesor</option>
<option value="admin">Administrador</option>
<option value="apoderado">Apoderado</option>
<option value="estudiante">Estudiante</option>
</select>
</div>
<button class="w-full bg-[#f26522] hover:bg-[#d95a1e] text-white font-bold py-3.5 px-4 rounded-xl shadow-md transition-colors flex items-center justify-center gap-2 mt-2">
          Crear y Enviar Invitación
        </button>
</div>
</section>
<!-- END: Nuevo Usuario Section -->
<!-- BEGIN: User List Section -->
<section data-purpose="user-management">
<div class="flex flex-col gap-4 mb-4 px-1">
<div class="flex items-center justify-between">
<div class="flex items-center gap-2">
<div class="text-[#f26522]">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<h2 class="text-lg font-bold text-gray-800">Usuarios Activos</h2>
</div>
<span class="text-[10px] font-semibold text-gray-400 bg-gray-200 px-2 py-1 rounded-full uppercase tracking-wider">12 Total</span>
</div>
<!-- Search Input -->
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<svg class="h-5 w-5 text-gray-400 group-focus-within:text-blue-500" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-gray-200 rounded-xl bg-white text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all shadow-sm" placeholder="Buscar por nombre o correo..." type="text"/>
</div>
</div>
<!-- User Cards Container -->
<div class="space-y-3">
<!-- User: Admin -->
<article class="bg-white p-4 rounded-2xl flex items-center justify-between border border-gray-100 card-shadow">
<div class="flex items-center gap-3">
<div class="h-12 w-12 rounded-full bg-indigo-500 text-white flex items-center justify-center font-bold text-lg shadow-sm">
              AM
            </div>
<div>
<div class="flex items-center gap-2">
<h3 class="font-bold text-gray-800 text-sm">Ana Martínez</h3>
<span class="text-[10px] bg-indigo-50 text-indigo-600 px-1.5 py-0.5 rounded font-bold uppercase tracking-wider">Admin</span>
</div>
<p class="text-xs text-gray-500">ana.admin@colegio.edu</p>
</div>
</div>
<div class="flex items-center gap-2">
<button class="p-2 text-gray-400 hover:text-red-500 transition-colors">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
</article>
<!-- User: Profesor -->
<article class="bg-white p-4 rounded-2xl flex items-center justify-between border border-gray-100 card-shadow">
<div class="flex items-center gap-3">
<div class="h-12 w-12 rounded-full bg-green-500 text-white flex items-center justify-center font-bold text-lg shadow-sm">
              JS
            </div>
<div>
<div class="flex items-center gap-2">
<h3 class="font-bold text-gray-800 text-sm">Javier Soto</h3>
<span class="text-[10px] bg-green-50 text-green-600 px-1.5 py-0.5 rounded font-bold uppercase tracking-wider">Profesor</span>
</div>
<p class="text-xs text-gray-500">j.soto@colegio.edu</p>
</div>
</div>
<div class="flex items-center gap-2">
<button class="p-2 text-gray-400 hover:text-red-500 transition-colors">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
</article>
<!-- User: Apoderado -->
<article class="bg-white p-4 rounded-2xl flex items-center justify-between border border-gray-100 card-shadow">
<div class="flex items-center gap-3">
<div class="h-12 w-12 rounded-full bg-purple-500 text-white flex items-center justify-center font-bold text-lg shadow-sm">
              CR
            </div>
<div>
<div class="flex items-center gap-2">
<h3 class="font-bold text-gray-800 text-sm">Carlos Ruiz</h3>
<span class="text-[10px] bg-purple-50 text-purple-600 px-1.5 py-0.5 rounded font-bold uppercase tracking-wider">Apoderado</span>
</div>
<p class="text-xs text-gray-500">c.ruiz_padre@mail.com</p>
</div>
</div>
<div class="flex items-center gap-2">
<button class="p-2 text-gray-400 hover:text-red-500 transition-colors">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</div>
</article>
<!-- User: Pending Invite (Dashed) -->
<article class="bg-slate-50 p-4 rounded-2xl flex items-center justify-between border-2 border-dashed border-gray-200">
<div class="flex items-center gap-3 opacity-70">
<div class="h-12 w-12 rounded-full bg-gray-200 text-gray-500 flex items-center justify-center font-bold text-lg italic">
              ?
            </div>
<div>
<h3 class="font-medium text-gray-700 italic text-sm">m.lopez@ejemplo.com</h3>
<p class="text-[10px] text-orange-500 font-bold uppercase tracking-widest">Invitación Pendiente</p>
</div>
</div>
<button class="p-2 text-gray-400 hover:text-red-500 transition-colors">
<svg class="w-5 h-5" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</button>
</article>
</div>
</section>
<!-- END: User List Section -->
</main>
<!-- BEGIN: Bottom Navigation -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex justify-around items-center py-2 z-20 max-w-[480px] mx-auto">
<button class="flex flex-col items-center gap-1 group">
<svg class="h-6 w-6 text-gray-400 group-hover:text-blue-500" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-medium text-gray-400 group-hover:text-blue-500 uppercase">Inicio</span>
</button>
<button class="flex flex-col items-center gap-1 group">
<svg class="h-6 w-6 text-gray-400 group-hover:text-blue-500" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-[10px] font-medium text-gray-400 group-hover:text-blue-500 uppercase">Notas</span>
</button>
</nav>
<!-- END: Bottom Navigation -->
</div>
</body></html>
