<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Agenda Escolar - Login</title>
<!-- BEGIN: Scripts and Config -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'school-primary': '#6366f1',
            'school-secondary': '#8b5cf6',
            'school-bg': '#f8fafc',
            'school-accent': '#e0e7ff'
          },
          borderRadius: {
            'xl': '1rem',
            '2xl': '1.5rem',
          }
        }
      }
    }
  </script>
<!-- END: Scripts and Config -->
<!-- BEGIN: Custom Styles -->
<style data-purpose="layout-customizations">
    body {
      background-color: #f8fafc;
      /* Soft gradient background for a modern feel */
      background: radial-gradient(circle at top left, #eff6ff 0%, #f8fafc 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }
  </style>
<!-- END: Custom Styles -->
</head>
<body class="flex flex-col items-center justify-center p-6 antialiased">
<!-- BEGIN: MainContent -->
<main class="w-full max-w-sm flex flex-col items-center" data-purpose="login-container">
<!-- Header/Logo Section -->
<header class="mb-10 text-center" data-purpose="brand-header">
<div class="inline-flex items-center justify-center w-20 h-20 bg-indigo-100 rounded-2xl mb-4 shadow-sm">
<!-- School Icon Representation -->
<svg class="h-12 w-12 text-school-primary" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 14l9-5-9-5-9 5 9 5z"></path>
<path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"></path>
<path d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<h1 class="text-3xl font-bold text-gray-800 tracking-tight">Agenda Escolar</h1>
<p class="text-gray-500 mt-2">Tu día a día, organizado.</p>
</header>
<!-- Login Form Section -->
<section class="w-full glass-card p-8 rounded-3xl shadow-xl" data-purpose="login-form-card">
<h2 class="text-xl font-semibold text-gray-700 mb-6 text-center">Bienvenido de nuevo</h2>
<form action="#" class="space-y-6" method="POST">
<!-- Email Input -->
<div class="space-y-2">
<label class="block text-sm font-medium text-gray-600 ml-1" for="email">Correo Electrónico</label>
<input class="w-full px-4 py-3 rounded-xl border-gray-200 focus:border-indigo-500 focus:ring focus:ring-indigo-200 transition-all duration-200 bg-white/50" id="email" name="email" placeholder="ejemplo@escuela.com" required="" type="email"/>
</div>
<!-- Magic Link Button -->
<button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 rounded-xl shadow-lg shadow-indigo-100 transition-all active:scale-[0.98] flex items-center justify-center space-x-2" type="submit">
<span>Entrar con Magic Link</span>
<svg class="h-5 w-5" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" fill-rule="evenodd"></path>
</svg>
</button>
</form>
<!-- Help/Info Text -->
<div class="mt-8 text-center" data-purpose="form-footer">
<p class="text-sm text-gray-400">
          Te enviaremos un enlace de acceso seguro a tu bandeja de entrada.
        </p>
</div>
</section>
<!-- Support/Help Footer -->
<footer class="mt-12 text-center" data-purpose="support-links">
<button class="text-indigo-600 font-medium hover:text-indigo-800 transition-colors flex items-center justify-center mx-auto">
<svg class="h-5 w-5 mr-1" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
        ¿Necesitas ayuda?
      </button>
<div class="mt-8 opacity-40">
<span class="text-xs uppercase tracking-widest text-gray-500 font-bold">PWA v1.0</span>
</div>
</footer>
</main>
<!-- END: MainContent -->
</body></html>
